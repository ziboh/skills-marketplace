name: Sync marketplace.json from awesome-agent-skills

on:
  schedule:
    # 每天 UTC 00:00 自动运行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 支持手动触发
  push:
    branches: [main, master]
    paths:
      - 'scripts/generate-marketplace.mjs'
      - '.github/workflows/sync-marketplace.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate marketplace.json
        run: node scripts/generate-marketplace.mjs

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet marketplace.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add marketplace.json
          git commit -m "sync marketplace.json from awesome-agent-skills"
          git push
